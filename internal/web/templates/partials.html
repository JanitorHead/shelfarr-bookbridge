{{define "bookrow"}}<div class="book accent-{{stateClass .State}}">
<div class="cover">{{if .CoverURL}}<img src="{{.CoverURL}}" alt="" loading="lazy">{{else}}<span class="cover-ph">{{initials .Title}}</span>{{end}}</div>
<div class="bk-main"><div class="bk-title">{{.Title}}</div><div class="bk-sub">{{.Author}}{{range .Shelves}} <span class="tag">{{.}}</span>{{end}}</div></div>
<div class="bk-meta"><span class="badge badge-{{stateClass .State}}">{{stateLabel .State}}</span>{{if .Language}} <span class="muted lang">{{.Language}}</span>{{end}}</div>
</div>{{end}}
